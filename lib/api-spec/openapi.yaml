openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Investor Buddy API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: stocks
    description: Stock operations
  - name: criteria
    description: Criteria set operations
  - name: watchlist
    description: Watchlist operations
  - name: screen
    description: Screening operations
  - name: analyze
    description: AI analysis operations
  - name: dashboard
    description: Dashboard summary operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stocks:
    get:
      operationId: getStocks
      tags: [stocks]
      summary: Get all stocks
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of stocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stock"

  /stocks/search/{query}:
    get:
      operationId: searchStocks
      tags: [stocks]
      summary: Search for stocks by name or ticker via Alpha Vantage
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockSearchResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stocks/add/{ticker}:
    post:
      operationId: addStock
      tags: [stocks]
      summary: Add a stock by fetching from Alpha Vantage
      security:
        - bearerAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stock"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stocks/refresh/{ticker}:
    post:
      operationId: refreshStock
      tags: [stocks]
      summary: Refresh a stock's data from Alpha Vantage
      security:
        - bearerAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stocks/{ticker}:
    get:
      operationId: getStock
      tags: [stocks]
      summary: Get a stock by ticker
      security:
        - bearerAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stock"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteStock
      tags: [stocks]
      summary: Delete a stock from the database
      security:
        - bearerAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /criteria:
    get:
      operationId: getCriteriaSets
      tags: [criteria]
      summary: Get user's criteria sets
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of criteria sets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CriteriaSet"

    post:
      operationId: createCriteriaSet
      tags: [criteria]
      summary: Create or update a criteria set
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCriteriaSetRequest"
      responses:
        "201":
          description: Criteria set created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CriteriaSet"

  /criteria/{id}:
    put:
      operationId: updateCriteriaSet
      tags: [criteria]
      summary: Update a criteria set
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCriteriaSetRequest"
      responses:
        "200":
          description: Criteria set updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CriteriaSet"

    delete:
      operationId: deleteCriteriaSet
      tags: [criteria]
      summary: Delete a criteria set
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /screen:
    post:
      operationId: screenStocks
      tags: [screen]
      summary: Screen stocks against criteria
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScreenRequest"
      responses:
        "200":
          description: Screening results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScreenResult"

  /watchlist:
    get:
      operationId: getWatchlist
      tags: [watchlist]
      summary: Get user's watchlist
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Watchlist items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WatchlistItem"

  /watchlist/{ticker}:
    post:
      operationId: addToWatchlist
      tags: [watchlist]
      summary: Add a stock to watchlist
      security:
        - bearerAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Added to watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

    delete:
      operationId: removeFromWatchlist
      tags: [watchlist]
      summary: Remove a stock from watchlist
      security:
        - bearerAuth: []
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed from watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /analyze:
    post:
      operationId: analyzeStock
      tags: [analyze]
      summary: Get AI analysis for a stock
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: AI analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/sector-breakdown:
    get:
      operationId: getSectorBreakdown
      tags: [dashboard]
      summary: Get stock count by sector
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Sector breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SectorCount"

  /dashboard/top-performers:
    get:
      operationId: getTopPerformers
      tags: [dashboard]
      summary: Get top performing stocks by EPS growth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Top performers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stock"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required:
        - success

    AuthRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        email:
          type: string
      required:
        - token
        - email

    Stock:
      type: object
      properties:
        ticker:
          type: string
        name:
          type: string
        sector:
          type: string
        price:
          type: number
        peRatio:
          type: number
        debtToEquity:
          type: number
        epsGrowth:
          type: number
        dividendYield:
          type: number
        roe:
          type: number
        revenueGrowth:
          type: number
        profitMargin:
          type: number
        currentRatio:
          type: number
        marketCapB:
          type: number
        beta:
          type: number
        updatedAt:
          type: string
      required:
        - ticker
        - name
        - sector
        - price
        - peRatio
        - debtToEquity
        - epsGrowth
        - dividendYield
        - roe
        - revenueGrowth
        - profitMargin
        - currentRatio
        - marketCapB
        - beta
        - updatedAt

    Criterion:
      type: object
      properties:
        metric:
          type: string
        operator:
          type: string
          enum: [">", "<", ">=", "<=", "between"]
        value:
          type: number
        value2:
          type: ["number", "null"]
      required:
        - metric
        - operator
        - value

    CriteriaSet:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        criteria:
          type: array
          items:
            $ref: "#/components/schemas/Criterion"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - criteria
        - createdAt
        - updatedAt

    CreateCriteriaSetRequest:
      type: object
      properties:
        id:
          type: ["string", "null"]
        name:
          type: string
        criteria:
          type: array
          items:
            $ref: "#/components/schemas/Criterion"
      required:
        - name
        - criteria

    ScreenRequest:
      type: object
      properties:
        criteria:
          type: array
          items:
            $ref: "#/components/schemas/Criterion"
      required:
        - criteria

    ScreenResult:
      type: object
      properties:
        ticker:
          type: string
        name:
          type: string
        sector:
          type: string
        score:
          type: number
        price:
          type: number
        peRatio:
          type: number
        debtToEquity:
          type: number
        epsGrowth:
          type: number
        dividendYield:
          type: number
        roe:
          type: number
        revenueGrowth:
          type: number
        profitMargin:
          type: number
        currentRatio:
          type: number
        marketCapB:
          type: number
        beta:
          type: number
        criteriaResults:
          type: array
          items:
            $ref: "#/components/schemas/CriterionResult"
      required:
        - ticker
        - name
        - sector
        - score
        - price
        - peRatio
        - debtToEquity
        - epsGrowth
        - dividendYield
        - roe
        - revenueGrowth
        - profitMargin
        - currentRatio
        - marketCapB
        - beta
        - criteriaResults

    CriterionResult:
      type: object
      properties:
        metric:
          type: string
        passed:
          type: boolean
        value:
          type: number
      required:
        - metric
        - passed
        - value

    WatchlistItem:
      type: object
      properties:
        ticker:
          type: string
        name:
          type: string
        sector:
          type: string
        price:
          type: number
        peRatio:
          type: number
          nullable: true
        dividendYield:
          type: number
          nullable: true
        addedAt:
          type: string
      required:
        - ticker
        - name
        - sector
        - price
        - addedAt

    AnalyzeRequest:
      type: object
      properties:
        ticker:
          type: string
        stock:
          $ref: "#/components/schemas/Stock"
        criteria:
          type: array
          items:
            $ref: "#/components/schemas/Criterion"
        score:
          type: number
      required:
        - ticker
        - stock
        - criteria
        - score

    AnalyzeResponse:
      type: object
      properties:
        explanation:
          type: string
      required:
        - explanation

    DashboardSummary:
      type: object
      properties:
        totalStocks:
          type: integer
        totalCriteriaSets:
          type: integer
        watchlistCount:
          type: integer
        sectorsCount:
          type: integer
        avgPeRatio:
          type: number
        avgEpsGrowth:
          type: number
      required:
        - totalStocks
        - totalCriteriaSets
        - watchlistCount
        - sectorsCount
        - avgPeRatio
        - avgEpsGrowth

    SectorCount:
      type: object
      properties:
        sector:
          type: string
        count:
          type: integer
      required:
        - sector
        - count

    StockSearchResult:
      type: object
      properties:
        ticker:
          type: string
        name:
          type: string
        type:
          type: string
        region:
          type: string
        inDatabase:
          type: boolean
      required:
        - ticker
        - name
        - type
        - region
        - inDatabase
